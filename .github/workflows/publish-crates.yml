name: Publish Crates

on:
  push:
    tags:
      - "sym-adv-v*"

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install stable Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            code -> code/target

      - name: Run crate verification
        run: ./scripts/check-crates.sh

  publish:
    needs: verify
    if: vars.CRATES_IO_TRUSTED_PUBLISHING_ENABLED == 'true'
    runs-on: ubuntu-latest
    environment: crates-io-publish

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install stable Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            code -> code/target

      - name: Rerun crate verification
        run: ./scripts/check-crates.sh

      - name: Authenticate to crates.io via trusted publishing
        id: auth
        uses: rust-lang/crates-io-auth-action@v1

      - name: Publish sym-adv crates
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: |
          set -euo pipefail

          crate_version_exists() {
            local crate_name="$1"
            local version="$2"
            curl --silent --show-error --fail \
              "https://crates.io/api/v1/crates/${crate_name}/${version}" \
              >/dev/null 2>&1
          }

          wait_for_crate_version() {
            local crate_name="$1"
            local version="$2"

            for attempt in $(seq 1 30); do
              if crate_version_exists "$crate_name" "$version"; then
                echo "${crate_name} ${version} is visible on crates.io"
                return 0
              fi

              echo "waiting for ${crate_name} ${version} to become visible on crates.io (${attempt}/30)"
              sleep 10
            done

            echo "timed out waiting for ${crate_name} ${version} on crates.io" >&2
            return 1
          }

          publish_if_needed() {
            local crate_name="$1"
            if crate_version_exists "$crate_name" "$VERSION"; then
              echo "${crate_name} ${VERSION} already published; skipping"
              return 0
            fi

            cargo publish --locked -p "$crate_name"
          }

          VERSION="$(
            awk '
              /^\[workspace\.package\]/ { in_section = 1; next }
              /^\[/ { in_section = 0 }
              in_section && $1 == "version" {
                gsub(/"/, "", $3)
                print $3
                exit
              }
            ' code/Cargo.toml
          )"

          publish_if_needed sym-adv-ring
          wait_for_crate_version sym-adv-ring "$VERSION"
          publish_if_needed sym-adv-encoding
